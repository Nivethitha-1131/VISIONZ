<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VISIONZ — Reports</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Outfit:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<style>
:root{--bg:#020617;--surface:#0F172A;--card:#111827;--hover:#1E293B;--accent:#38bdf8;--text:#e2e8f0;--dim:#64748b;--border:rgba(56,189,248,0.1);}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);font-family:'Outfit',sans-serif;color:var(--text);min-height:100vh;}
.reports-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:1.5rem;}
</style>
</head>
<body>
<script src="js/navbar.js"></script>
<div style="padding:1.5rem;max-width:1200px;margin:0 auto;">
  <h1 style="font-family:'Orbitron',sans-serif;font-size:1.3rem;margin-bottom:0.5rem;color:#fff;letter-spacing:2px;">REPORTS <span style="color:var(--accent);">CENTER</span></h1>
  <p style="color:var(--dim);margin-bottom:1.5rem;font-size:0.78rem;">Download quality control reports from video analysis sessions</p>
  <div class="reports-card">
    <div style="text-align:center;padding:3rem 1.5rem;color:var(--dim);">
      <i class="bi bi-file-earmark-pdf" style="font-size:3rem;display:block;margin-bottom:1rem;"></i>
      <p>Reports page - Generated PDF reports from video analysis</p>
      <p style="font-size:0.8rem;margin-top:1rem;">Upload videos on Monitor page to generate reports</p>
    </div>
  </div>
</div>
<script src="js/api.js"></script>
<script>Auth.guard();</script>
</body>
</html>
