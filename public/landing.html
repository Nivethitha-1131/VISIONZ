<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VISIONZ — Monitor</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Outfit:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<style>
:root{--bg:#020617;--surface:#0F172A;--card:#111827;--hover:#1E293B;--accent:#38bdf8;--green:#22c55e;--red:#ef4444;--amber:#f59e0b;--purple:#a78bfa;--text:#e2e8f0;--dim:#64748b;--border:rgba(56,189,248,0.1);--border2:rgba(56,189,248,0.25);}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);font-family:'Outfit',sans-serif;color:var(--text);min-height:100vh;}
.video-container{display:flex;align-items:center;justify-content:center;background:#000;border-radius:12px;min-height:300px;margin:1rem 0;}
.upload-hint{text-align:center;padding:2rem;color:var(--dim);}
</style>
</head>
<body>
<script src="js/navbar.js"></script>
<div style="padding:1.5rem;max-width:1400px;margin:0 auto;">
  <h1 style="font-family:'Orbitron',sans-serif;font-size:1.3rem;margin-bottom:1rem;color:#fff;letter-spacing:2px;">MONITOR <span style="color:var(--accent);">VIDEO</span></h1>
  <div class="video-container">
    <div class="upload-hint">
      <i class="bi bi-cloud-upload" style="font-size:3rem;color:var(--accent);margin-bottom:1rem;display:block;"></i>
      <p>Monitor page - Upload and analyze videos here</p>
      <p style="font-size:0.8rem;color:var(--dim);margin-top:1rem;">FastAPI backend routes video analysis requests</p>
    </div>
  </div>
</div>
<script src="js/api.js"></script>
<script>Auth.guard();</script>
</body>
</html>
