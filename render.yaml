services:
  - type: web
    name: visionz-backend
    runtime: python
    buildCommand: pip install --upgrade pip setuptools wheel && pip install -r backend/requirements.txt
    startCommand: sh -c 'cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT'
    envVars:
      - key: PYTHON_VERSION
        value: "3.10.14"
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: LOG_LEVEL
        value: "INFO"
      - key: CORS_ORIGINS
        value: "https://visionz.vercel.app"
      - key: PORT
        value: "10000"

