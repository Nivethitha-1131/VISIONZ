<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VISIONZ — Profile</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Outfit:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<style>
:root{--bg:#020617;--surface:#0F172A;--card:#111827;--hover:#1E293B;--accent:#38bdf8;--text:#e2e8f0;--dim:#64748b;--border:rgba(56,189,248,0.1);}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);font-family:'Outfit',sans-serif;color:var(--text);min-height:100vh;}
.profile-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:1.5rem;margin-bottom:1rem;}
.big-avatar{width:88px;height:88px;border-radius:22px;background:linear-gradient(135deg,#3b82f6,#8b5cf6);display:flex;align-items:center;justify-content:center;font-size:2rem;font-weight:800;color:#fff;margin:0 auto 1rem;}
.profile-name{font-family:'Orbitron',sans-serif;font-size:1.4rem;font-weight:700;color:#fff;text-align:center;}
.profile-email{font-size:0.82rem;color:var(--dim);text-align:center;margin-top:0.5rem;}
</style>
</head>
<body>
<script src="js/navbar.js"></script>
<div style="padding:1.5rem;max-width:900px;margin:0 auto;">
  <div class="profile-card">
    <div class="big-avatar" id="profileAvatar">AK</div>
    <div class="profile-name" id="profileName">User Profile</div>
    <div class="profile-email" id="profileEmail">user@visionz.com</div>
  </div>
  <div class="profile-card">
    <p>User profile and settings page</p>
    <p style="color:var(--dim);font-size:0.9rem;margin-top:1rem;">Backend API populates profile data</p>
  </div>
</div>
<script src="js/api.js"></script>
<script>Auth.guard();</script>
</body>
</html>
