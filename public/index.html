<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VISIONZ — Snap Scan Ship</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<style>
:root{--bg:#020617;--surface:#0F172A;--card:#111827;--hover:#1E293B;--accent:#38bdf8;--accent2:#818cf8;--glow:rgba(56,189,248,0.4);}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;}
body{background:var(--bg);font-family:'Outfit',sans-serif;display:flex;align-items:center;justify-content:center;position:relative;}
#canvas{position:fixed;inset:0;z-index:0;pointer-events:none;}
.grid-overlay{position:fixed;inset:0;z-index:1;pointer-events:none;background-image:linear-gradient(rgba(56,189,248,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(56,189,248,0.04) 1px,transparent 1px);background-size:80px 80px;mask-image:radial-gradient(ellipse 80% 80% at 50% 50%,black 40%,transparent 100%);}
.center-glow{position:fixed;width:700px;height:700px;border-radius:50%;background:radial-gradient(circle,rgba(56,189,248,0.07) 0%,rgba(129,140,248,0.04) 40%,transparent 70%);top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;z-index:1;animation:glowPulse 4s ease-in-out infinite;}
@keyframes glowPulse{0%,100%{opacity:0.8;transform:translate(-50%,-50%) scale(1);}50%{opacity:1;transform:translate(-50%,-50%) scale(1.08);}}
.glass-card{position:relative;z-index:10;background:rgba(15,23,42,0.6);border:1px solid rgba(56,189,248,0.18);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-radius:28px;padding:3.5rem 4rem;text-align:center;max-width:680px;width:92%;box-shadow:0 0 0 1px rgba(56,189,248,0.08),0 25px 80px rgba(0,0,0,0.6),inset 0 1px 0 rgba(255,255,255,0.06);animation:cardReveal 1s cubic-bezier(0.34,1.2,0.64,1) 0.3s both;}
@keyframes cardReveal{from{opacity:0;transform:translateY(40px) scale(0.95);}to{opacity:1;transform:none;}}
.brand-eye{width:72px;height:72px;margin:0 auto 1.5rem;background:linear-gradient(135deg,rgba(56,189,248,0.15),rgba(129,140,248,0.1));border:1px solid rgba(56,189,248,0.3);border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:2rem;box-shadow:0 0 30px rgba(56,189,248,0.15),inset 0 1px 0 rgba(255,255,255,0.1);animation:iconFloat 3s ease-in-out infinite;}
@keyframes iconFloat{0%,100%{transform:translateY(0);}50%{transform:translateY(-6px);}}
.brand-name{font-family:'Orbitron',sans-serif;font-size:clamp(3.5rem,10vw,6.5rem);font-weight:900;letter-spacing:12px;color:#fff;position:relative;display:inline-block;text-shadow:0 0 40px rgba(56,189,248,0.5),0 0 80px rgba(56,189,248,0.2);animation:nameReveal 0.8s ease 0.8s both;}
@keyframes nameReveal{from{opacity:0;letter-spacing:30px;}to{opacity:1;letter-spacing:12px;}}
.brand-name::before,.brand-name::after{content:'VISIONZ';position:absolute;top:0;left:0;width:100%;font-family:'Orbitron',sans-serif;font-weight:900;font-size:inherit;letter-spacing:inherit;}
.brand-name::before{color:#38bdf8;animation:glitch1 4s infinite;clip-path:polygon(0 0,100% 0,100% 35%,0 35%);}
.brand-name::after{color:#818cf8;animation:glitch2 4s infinite;clip-path:polygon(0 65%,100% 65%,100% 100%,0 100%);}
@keyframes glitch1{0%,90%,100%{transform:none;opacity:0;}92%{transform:translate(-3px,1px);opacity:0.8;}94%{transform:translate(3px,-1px);opacity:0.6;}96%{transform:translate(-2px,2px);opacity:0.8;}98%{transform:none;opacity:0;}}
@keyframes glitch2{0%,90%,100%{transform:none;opacity:0;}93%{transform:translate(3px,2px);opacity:0.7;}95%{transform:translate(-3px,-1px);opacity:0.5;}97%{transform:translate(2px,1px);opacity:0.7;}99%{transform:none;opacity:0;}}
.tagline{font-family:'Orbitron',sans-serif;font-size:clamp(0.8rem,2.5vw,1.1rem);font-weight:400;letter-spacing:clamp(6px,2vw,14px);color:rgba(56,189,248,0.7);margin-top:0.75rem;text-transform:uppercase;animation:tagReveal 0.8s ease 1.2s both;}
@keyframes tagReveal{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:none;}}
.tagline .dot{color:rgba(255,255,255,0.2);margin:0 4px;}
.glass-divider{width:80px;height:1px;background:linear-gradient(90deg,transparent,rgba(56,189,248,0.5),transparent);margin:1.75rem auto;animation:tagReveal 0.5s ease 1.5s both;}
.desc{color:rgba(148,163,184,0.9);font-size:clamp(0.82rem,2vw,0.95rem);font-weight:400;line-height:1.7;max-width:420px;margin:0 auto 2rem;animation:tagReveal 0.5s ease 1.6s both;}
.enter-btn{display:inline-flex;align-items:center;gap:10px;background:linear-gradient(135deg,rgba(56,189,248,0.15),rgba(129,140,248,0.1));border:1px solid rgba(56,189,248,0.4);color:#fff;font-family:'Orbitron',sans-serif;font-size:0.85rem;font-weight:700;letter-spacing:3px;padding:1rem 2.5rem;border-radius:50px;text-decoration:none;cursor:pointer;transition:all 0.3s ease;position:relative;overflow:hidden;animation:tagReveal 0.5s ease 1.8s both;box-shadow:0 0 20px rgba(56,189,248,0.1);}
.enter-btn::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(56,189,248,0.2),rgba(129,140,248,0.15));opacity:0;transition:opacity 0.3s;}
.enter-btn:hover{border-color:rgba(56,189,248,0.8);box-shadow:0 0 40px rgba(56,189,248,0.3),0 0 80px rgba(56,189,248,0.1);transform:translateY(-2px);color:#fff;}
.enter-btn:hover::before{opacity:1;}
.corner{position:absolute;width:20px;height:20px;border-color:rgba(56,189,248,0.4);border-style:solid;}
.corner.tl{top:16px;left:16px;border-width:2px 0 0 2px;border-radius:4px 0 0 0;}
.corner.tr{top:16px;right:16px;border-width:2px 2px 0 0;border-radius:0 4px 0 0;}
.corner.bl{bottom:16px;left:16px;border-width:0 0 2px 2px;border-radius:0 0 0 4px;}
.corner.br{bottom:16px;right:16px;border-width:0 2px 2px 0;border-radius:0 0 4px 0;}
.stats-row{display:flex;justify-content:center;gap:2.5rem;margin-top:2rem;padding-top:1.5rem;border-top:1px solid rgba(56,189,248,0.1);animation:tagReveal 0.5s ease 2s both;}
.stat-item{text-align:center;}
.stat-num{font-family:'Orbitron',sans-serif;font-size:1.3rem;font-weight:700;color:var(--accent);}
.stat-lbl{font-size:0.65rem;color:rgba(148,163,184,0.6);letter-spacing:2px;text-transform:uppercase;margin-top:2px;}
.version-badge{position:fixed;bottom:1.5rem;right:1.5rem;z-index:20;font-family:'Orbitron',monospace;font-size:0.6rem;color:rgba(56,189,248,0.3);letter-spacing:2px;}
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div class="grid-overlay"></div>
<div class="center-glow"></div>
<div class="glass-card">
  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>
  <div class="brand-eye">👁️</div>
  <div class="brand-name">VISIONZ</div>
  <div class="tagline">SNAP<span class="dot">·</span>SCAN<span class="dot">·</span>SHIP</div>
  <div class="glass-divider"></div>
  <p class="desc">
    AI-Powered FMCG Quality Control System.<br>
    Real-time defect detection at production-line speed.
  </p>
  <a href="login.html" class="enter-btn" onclick="localStorage.removeItem('visionz_token'); localStorage.removeItem('visionz_user');">
    ENTER SYSTEM <i class="bi bi-arrow-right"></i>
  </a>
  <div class="stats-row">
    <div class="stat-item"><div class="stat-num" id="counter1">0</div><div class="stat-lbl">Products Scanned</div></div>
    <div class="stat-item"><div class="stat-num" id="counter2">0</div><div class="stat-lbl">Defects Caught</div></div>
    <div class="stat-item"><div class="stat-num" id="counter3">0%</div><div class="stat-lbl">Accuracy</div></div>
  </div>
</div>
<div class="version-badge">VISIONZ v2.0 · QC SYSTEM</div>
<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let W, H, particles = [];
function resize() {W = canvas.width = window.innerWidth;H = canvas.height = window.innerHeight;}
resize();
window.addEventListener('resize', resize);
class Particle {
  constructor() { this.reset(); }
  reset() {this.x = Math.random() * W;this.y = Math.random() * H;this.size = Math.random() * 1.5 + 0.3;this.speedX = (Math.random() - 0.5) * 0.4;this.speedY = (Math.random() - 0.5) * 0.4;this.opacity = Math.random() * 0.5 + 0.1;this.color = Math.random() > 0.5 ? '56,189,248' : '129,140,248';}
  update() {this.x += this.speedX; this.y += this.speedY;if (this.x < 0 || this.x > W || this.y < 0 || this.y > H) this.reset();}
  draw() {ctx.beginPath();ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);ctx.fillStyle = `rgba(${this.color},${this.opacity})`;ctx.fill();}
}
for (let i = 0; i < 120; i++) particles.push(new Particle());
function drawConnections() {
  for (let i = 0; i < particles.length; i++) {
    for (let j = i + 1; j < particles.length; j++) {
      const dx = particles[i].x - particles[j].x;
      const dy = particles[i].y - particles[j].y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 100) {
        ctx.beginPath();ctx.moveTo(particles[i].x, particles[i].y);ctx.lineTo(particles[j].x, particles[j].y);ctx.strokeStyle = `rgba(56,189,248,${0.06 * (1 - dist / 100)})`;ctx.lineWidth = 0.5;ctx.stroke();
      }
    }
  }
}
function animate() {ctx.clearRect(0, 0, W, H);drawConnections();particles.forEach(p => { p.update(); p.draw(); });requestAnimationFrame(animate);}
animate();
</script>
</body>
</html>
