<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VISIONZ — Analytics</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Outfit:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<style>
:root{--bg:#020617;--surface:#0F172A;--card:#111827;--hover:#1E293B;--accent:#38bdf8;--green:#22c55e;--red:#ef4444;--amber:#f59e0b;--text:#e2e8f0;--dim:#64748b;--border:rgba(56,189,248,0.1);}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);font-family:'Outfit',sans-serif;color:var(--text);min-height:100vh;}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:1.25rem;text-align:center;}
.stat-num{font-family:'Orbitron',sans-serif;font-size:2rem;font-weight:700;color:var(--accent);}
.stat-label{font-size:0.7rem;color:var(--dim);text-transform:uppercase;letter-spacing:1.5px;margin-top:0.5rem;}
</style>
</head>
<body>
<script src="js/navbar.js"></script>
<div style="padding:1.5rem;max-width:1400px;margin:0 auto;">
  <h1 style="font-family:'Orbitron',sans-serif;font-size:1.3rem;margin-bottom:1.5rem;color:#fff;letter-spacing:2px;">ANALYTICS <span style="color:var(--accent);">OVERVIEW</span></h1>
  <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:1rem;margin-bottom:2rem;">
    <div class="stat-card"><div class="stat-num">0</div><div class="stat-label">Frames Scanned</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--red);">0</div><div class="stat-label">Defects Detected</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--green);">0</div><div class="stat-label">Products Approved</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--amber);">—</div><div class="stat-label">Defect Rate</div></div>
  </div>
  <div style="background:var(--card);border:1px solid var(--border);border-radius:16px;padding:2rem;text-align:center;color:var(--dim);">
    <p>Analytics dashboard - Data visualization and reports</p>
  </div>
</div>
<script src="js/api.js"></script>
<script>Auth.guard();</script>
</body>
</html>
